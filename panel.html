<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Panel Admin — Classement Live</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#080a10;color:#e8eaf0;min-height:100vh}

/* LOCK */
#lock-screen{position:fixed;inset:0;background:#080a10;display:flex;align-items:center;justify-content:center;z-index:9999}
.lock-box{background:#10131c;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:36px 32px;width:320px;text-align:center}
.lock-logo{font-size:32px;margin-bottom:14px}
.lock-title{font-size:16px;font-weight:700;margin-bottom:4px}
.lock-sub{font-size:12px;color:#6b7280;margin-bottom:20px}
.lock-input{width:100%;background:#080a10;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px 14px;font-size:15px;color:#e8eaf0;font-family:'Inter',sans-serif;outline:none;text-align:center;letter-spacing:3px;margin-bottom:10px}
.lock-input:focus{border-color:#e10600}
.lock-input.err{border-color:#ef4444;animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.lock-btn{width:100%;padding:10px;border-radius:8px;border:none;background:#e10600;color:#fff;font-size:13px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;letter-spacing:.5px}
.lock-btn:hover{background:#c00400}
.lock-err{font-size:11px;color:#ef4444;margin-top:6px;height:14px}

/* APP LAYOUT */
#app{display:none;min-height:100vh}
.topbar{background:#10131c;border-bottom:1px solid rgba(255,255,255,.06);padding:10px 20px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:100}
.topbar h1{font-size:13px;font-weight:600;flex:1}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot.ok{background:#22c55e;animation:pu 2s infinite}
.dot.err{background:#ef4444}
.dot.loading{background:#f59e0b}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
.sync-lbl{font-size:11px;color:#6b7280}

/* SPLIT LAYOUT */
.split{display:grid;grid-template-columns:1fr 400px;min-height:calc(100vh - 41px)}
.edit-col{padding:16px;overflow-y:auto;border-right:1px solid rgba(255,255,255,.05)}
.preview-col{background:#0d0f18;display:flex;flex-direction:column;position:sticky;top:41px;height:calc(100vh - 41px)}

/* PREVIEW PANEL */
.preview-header{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between}
.preview-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#374151}
.preview-badge{font-size:9px;color:#22c55e;font-weight:600;display:flex;align-items:center;gap:4px}
.preview-badge::before{content:'';width:5px;height:5px;border-radius:50%;background:#22c55e;display:inline-block;animation:pu 2s infinite}
.preview-body{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;background:repeating-linear-gradient(45deg,rgba(255,255,255,.01) 0px,rgba(255,255,255,.01) 1px,transparent 1px,transparent 8px)}

/* OVERLAY LIVE */
.overlay-board{width:260px;font-family:'Barlow Condensed','Inter',sans-serif}

/* HEADER SESSION overlay */
.ov-sh{display:flex;align-items:center;background:rgba(10,12,20,.97);border-bottom:2px solid #e10600;padding:3px 6px 3px 5px;gap:5px;margin-bottom:2px}
.ov-sh-badge{background:#e10600;color:#fff;font-size:8px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:2px 5px;border-radius:2px;flex-shrink:0;font-family:'Barlow Condensed',sans-serif}
.ov-sh-session{font-size:9px;font-weight:600;color:#fff;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px}
.ov-sh-lap{font-size:9px;font-weight:700;color:#f59e0b;font-family:'Barlow Condensed',monospace;flex-shrink:0;letter-spacing:1px}
.ov-sh-time{font-size:9px;color:rgba(255,255,255,.4);font-family:'Barlow Condensed',monospace;flex-shrink:0;margin-left:3px}

/* CLASSE HEADER overlay */
.ov-group{margin-bottom:2px}
.ov-gh{display:flex;align-items:center;padding:3px 6px;gap:4px;background:rgba(10,12,20,.97)}
.ov-gh-label{font-size:8px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:1px 5px;border-radius:2px;flex-shrink:0;font-family:'Barlow Condensed',sans-serif}

/* ROWS overlay */
.ov-row{display:flex;align-items:center;height:20px;border-bottom:1px solid rgba(255,255,255,.04);position:relative;overflow:hidden}
.ov-row:last-child{border-bottom:none}
.ov-row.even{background:rgba(10,12,20,.97)}
.ov-row.odd{background:rgba(16,18,28,.97)}
.ov-row.p1{border-left:3px solid #c9a84c}
.ov-row.p2{border-left:3px solid #8c8c8c}
.ov-row.p3{border-left:3px solid #a0522d}
.ov-row.pn{border-left:3px solid transparent}

.ov-rpos{width:18px;text-align:center;font-size:10px;font-weight:800;flex-shrink:0;font-family:'Barlow Condensed',sans-serif}
.ov-rpos.p1{color:#c9a84c}.ov-rpos.p2{color:#9ca3af}.ov-rpos.p3{color:#cd7f32}.ov-rpos.pn{color:rgba(255,255,255,.28)}

.ov-rnum{font-size:9px;font-weight:900;width:22px;text-align:center;flex-shrink:0;border-radius:2px;margin:0 2px;line-height:14px;height:14px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px}
.ov-rcol{width:2px;flex-shrink:0;align-self:stretch}
.ov-rname{flex:1;font-size:11px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 4px 0 3px;line-height:1;letter-spacing:.5px;font-family:'Barlow Condensed',sans-serif}
.ov-rname .last{font-weight:800;text-transform:uppercase;letter-spacing:1px}
.ov-rsub{font-size:8px;color:rgba(255,255,255,.3);font-weight:500;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px}
.ov-rgap{width:46px;text-align:right;padding-right:5px;font-size:9px;font-weight:700;font-family:'Barlow Condensed',monospace;flex-shrink:0;letter-spacing:.5px}
.ov-rgap.leader{color:#f59e0b}
.ov-rgap.gap{color:rgba(255,255,255,.5)}

/* CARDS edit */
.card{background:#10131c;border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:14px;margin-bottom:12px}
.card-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#374151;margin-bottom:10px}
.meta-row{display:grid;grid-template-columns:90px 1fr 130px;gap:8px}
.field label{display:block;font-size:10px;color:#6b7280;margin-bottom:4px}
input.fi{width:100%;background:#080a10;border:1px solid rgba(255,255,255,.08);border-radius:7px;padding:7px 10px;font-size:12px;color:#e8eaf0;font-family:'Inter',sans-serif;outline:none}
input.fi:focus{border-color:#e10600}

.section{border:1px solid rgba(255,255,255,.06);border-radius:8px;margin-bottom:8px;overflow:hidden}
.section-head{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#0a0c14}
.section-label{font-size:10px;font-weight:800;letter-spacing:1.5px;padding:2px 8px;border-radius:2px;font-family:'Barlow Condensed',sans-serif}
input.section-name{background:transparent;border:none;color:rgba(255,255,255,.5);font-size:11px;font-weight:600;font-family:'Inter',sans-serif;outline:none;flex:1}
.section-color{width:22px;height:22px;padding:0;border-radius:4px;border:1px solid rgba(255,255,255,.1);cursor:pointer;background:transparent}
.del-section{padding:3px 7px;border-radius:5px;border:none;background:transparent;cursor:pointer;color:#374151;font-size:12px}
.del-section:hover{background:#2d1717;color:#ef4444}

.list{display:flex;flex-direction:column;gap:3px;padding:5px}
.entry{display:flex;align-items:center;gap:5px;background:#080a10;border:1px solid rgba(255,255,255,.05);border-radius:6px;padding:5px 7px;cursor:grab;user-select:none}
.entry:active{cursor:grabbing}
.entry.dragging{opacity:.3;border-style:dashed}
.entry.over{border-color:#e10600}
.handle{font-size:14px;color:#1f2937;flex-shrink:0}
.pos{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;background:#1f2937;color:#6b7280}
.pos.r1{background:#c9a84c22;color:#c9a84c}.pos.r2{background:#6b728022;color:#9ca3af}.pos.r3{background:#a0522d22;color:#cd7f32}
.logo-box{width:28px;height:28px;border-radius:5px;border:1px solid rgba(255,255,255,.07);background:#141722;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;cursor:pointer}
.logo-box:hover{border-color:#e10600}
.logo-box img{width:100%;height:100%;object-fit:contain}
.logo-fb{font-size:8px;font-weight:800}
.class-logo-box{width:32px;height:22px;border-radius:4px;border:1px solid rgba(255,255,255,.1);background:#141722;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;cursor:pointer;font-size:8px;color:#6b7280}
.class-logo-box:hover{border-color:#e10600}
.class-logo-box img{width:100%;height:100%;object-fit:contain}
.ei{background:#141722;border:1px solid rgba(255,255,255,.07);border-radius:6px;padding:5px 7px;font-size:12px;color:#e8eaf0;font-family:'Inter',sans-serif;outline:none}
.ei:focus{border-color:#e10600}
.ei-num{width:38px;text-align:center;font-weight:800}
.ei-abbrev{width:44px;text-align:center;font-weight:800;text-transform:uppercase;letter-spacing:1px}
.ei-name{flex:1;min-width:0}
.ei-sub{width:90px}
.cpick{width:24px;height:24px;padding:1px;border-radius:5px;border:1px solid rgba(255,255,255,.08);cursor:pointer;background:transparent;flex-shrink:0}
.del{width:20px;height:20px;border-radius:5px;border:none;background:transparent;cursor:pointer;color:#374151;font-size:11px;flex-shrink:0}
.del:hover{background:#2d1717;color:#ef4444}

.actions{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-top:10px}
.btn{padding:6px 12px;border-radius:7px;border:1px solid rgba(255,255,255,.09);background:#141722;cursor:pointer;font-size:12px;font-weight:600;color:#e8eaf0;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:4px}
.btn:hover{background:#1c2030}
.btn.go{background:#e10600;border-color:#a00400;color:#fff}
.btn.go:hover{background:#c00400}
.btn.add-class{background:#181b29;border-color:rgba(255,255,255,.1);color:#9ca3af}
.stt{font-size:10px;color:#374151;margin-left:auto}

@media(max-width:900px){.split{grid-template-columns:1fr}.preview-col{display:none}}
</style>
</head>
<body>

<div id="lock-screen">
  <div class="lock-box">
    <div class="lock-logo">🏁</div>
    <div class="lock-title">Panel Admin</div>
    <div class="lock-sub">Classement Live — Accès restreint</div>
    <input class="lock-input" id="pwd-input" type="password" placeholder="••••••" maxlength="20">
    <button class="lock-btn" onclick="checkPwd()">Accéder</button>
    <div class="lock-err" id="lock-err"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="dot loading" id="dot"></div>
    <h1>Panel Admin — Classement Live</h1>
    <span class="sync-lbl" id="sync-lbl">Chargement…</span>
  </div>
  <div class="split">
    <!-- COLONNE EDITION -->
    <div class="edit-col">
      <div class="card">
        <div class="card-title">Session</div>
        <div class="meta-row">
          <div class="field"><label>Série</label><input class="fi" id="m-series" placeholder="WEC, F1…"></div>
          <div class="field"><label>Session</label><input class="fi" id="m-session" placeholder="Race — Round 4"></div>
          <div class="field"><label>Tour / Elapsed</label><input class="fi" id="m-lap" placeholder="Lap 58 / 70"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Classement par classes</div>
        <div id="classes-list"></div>
        <div class="actions">
          <button class="btn add-class" onclick="addClass()">＋ Classe</button>
          <button class="btn go" onclick="saveNow()">⬆ Diffuser</button>
          <span class="stt" id="stt">—</span>
        </div>
      </div>
    </div>

    <!-- COLONNE PREVIEW -->
    <div class="preview-col">
      <div class="preview-header">
        <span class="preview-title">Aperçu Overlay</span>
        <span class="preview-badge">Live</span>
      </div>
      <div class="preview-body">
        <div class="overlay-board" id="preview-board"></div>
      </div>
    </div>
  </div>
</div>

<input type="file" id="logo-input" accept="image/*" style="display:none">
<input type="file" id="class-logo-input" accept="image/*" style="display:none">

<script>
const PASSWORD="SWT";
function checkPwd(){
  const v=document.getElementById('pwd-input').value;
  if(v===PASSWORD){document.getElementById('lock-screen').style.display='none';document.getElementById('app').style.display='block';loadFromBin();}
  else{const i=document.getElementById('pwd-input');i.classList.add('err');document.getElementById('lock-err').textContent='Mot de passe incorrect';setTimeout(()=>{i.classList.remove('err');i.value='';document.getElementById('lock-err').textContent='';},1000);}
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')checkPwd();});

const CONFIG={BIN_ID:"6a2095f2f5f4af5e29b4a8be",API_KEY:"$2a$10$MqXY3lAcczt1NJqs8jfK3.ESP.l5XPHjGmv0DfMhWPPDHcZRU0a3i",REFRESH_MS:2000};
const DEFAULT_DATA={
  meta:{series:"WEC",session:"Race — Round 4",lap:"Lap 1 / 70",elapsed:"0:35"},
  classes:[
    {label:"HYPERCAR",color:"#e10600",textColor:"#fff",entries:[
      {num:"2",name:"Hartley",sub:"Porsche",pts:"0",color:"#e10600",logo:""},
      {num:"50",name:"Fuoco",sub:"Ferrari",pts:"0.249",color:"#e8002d",logo:""},
      {num:"7",name:"Conway",sub:"Toyota",pts:"0.634",color:"#eb0a1e",logo:""}
    ]},
    {label:"GT3",color:"#22c55e",textColor:"#fff",entries:[
      {num:"57",name:"Wadoux",sub:"Ferrari",pts:"0",color:"#e8002d",logo:""},
      {num:"77",name:"Barker",sub:"Porsche",pts:"2.103",color:"#e10600",logo:""},
      {num:"55",name:"Hartshorne",sub:"Aston",pts:"5.882",color:"#115e59",logo:""}
    ]}
  ]
};

let data={meta:{},classes:[]},dragSrc=null,autoTimer=null,pendingLogo=null,pendingLogoClass=null,pendingClassLogo=null,saving=false;
const API=`https://api.jsonbin.io/v3/b/${CONFIG.BIN_ID}`;
const HDR={'Content-Type':'application/json','X-Master-Key':CONFIG.API_KEY};

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function contrast(hex){const h=hex||'#888',r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return(r*299+g*587+b*114)/1000>128?'#111':'#fff';}

function nameparts(n){const p=(n||'').trim().split(' ');if(p.length===1)return{first:'',last:p[0]};return{first:p.slice(0,-1).join(' '),last:p[p.length-1]};}
function getAbbrev(fullname){const parts=(fullname||'').trim().split(' ');if(parts.length===1)return parts[0].slice(0,3).toUpperCase();return parts[parts.length-1].slice(0,3).toUpperCase();}

async function loadFromBin(){
  try{const r=await fetch(API+'/latest',{headers:{'X-Master-Key':CONFIG.API_KEY}});if(!r.ok)throw new Error(r.status);const j=await r.json();const d=j.record||JSON.parse(JSON.stringify(DEFAULT_DATA));
    if(!d.classes&&d.entries){d.classes=[{label:"CLASS 1",color:"#e10600",textColor:"#fff",entries:d.entries}];delete d.entries;}
    data=d;render();setSync('ok','Synchronisé · '+ts());
  }catch(e){setSync('err','Erreur chargement');data=JSON.parse(JSON.stringify(DEFAULT_DATA));render();}
}

async function saveToBin(){
  if(saving)return;saving=true;setSync('loading','Envoi…');syncMeta();
  try{const r=await fetch(API,{method:'PUT',headers:HDR,body:JSON.stringify(data)});if(!r.ok)throw new Error(r.status);setSync('ok','Diffusé ✓ · '+ts());setStt('Diffusé ✓ · '+ts());}
  catch(e){setSync('err','Erreur : '+e.message);setStt('Erreur !');}
  saving=false;
}

function ts(){return new Date().toLocaleTimeString('fr-FR');}
function setSync(s,m){document.getElementById('dot').className='dot '+s;document.getElementById('sync-lbl').textContent=m;}
function setStt(m){document.getElementById('stt').textContent=m;}
function schedSave(){clearTimeout(autoTimer);autoTimer=setTimeout(saveToBin,1800);renderPreview();}
function syncMeta(){data.meta={series:document.getElementById('m-series').value,session:document.getElementById('m-session').value,lap:document.getElementById('m-lap').value};}

function addClass(){data.classes.push({label:'NOUVELLE',color:'#6b7280',textColor:'#fff',entries:[]});render();schedSave();}
function delClass(ci){data.classes.splice(ci,1);render();schedSave();}
function addEntry(ci){data.classes[ci].entries.push({num:String(data.classes[ci].entries.length+1),name:'Pilote',sub:'Équipe',color:data.classes[ci].color,logo:''});render();schedSave();}
function delEntry(ci,i){data.classes[ci].entries.splice(i,1);render();schedSave();}

/* ---- RENDER PREVIEW OVERLAY ---- */
function renderPreview(){
  syncMeta();
  const d=data;
  const meta=d.meta||{};
  const elapsed=meta.elapsed?`<span class="ov-sh-time">${esc(meta.elapsed)}</span>`:'';
  let html=`<div class="ov-sh">
    <span class="ov-sh-badge">${esc(meta.series||'LIVE')}</span>
    <span class="ov-sh-session">${esc(meta.session||'Session')}</span>
    <span class="ov-sh-lap">${esc(meta.lap||'')}</span>
    ${elapsed}
  </div>`;
  (d.classes||[]).forEach(cl=>{
    const tc=cl.textColor||'#fff';
    const entries=cl.entries||[];
    const clLogo=cl.logo?`<img src="${cl.logo}" style="width:16px;height:16px;object-fit:contain;border-radius:2px;margin-left:3px" alt="">`:'';
    const rows=entries.map((e,i)=>{
      const pos=i+1;
      const pc=i===0?'p1':i===1?'p2':i===2?'p3':'pn';
      const even=i%2===0?'even':'odd';
      const col=e.color||'#555';const tc2=contrast(col);
      const abbrev=e.abbrev||getAbbrev(e.name);
      const entryLogo=e.logo?`<div style="width:16px;height:16px;flex-shrink:0;margin-right:3px;display:flex;align-items:center;justify-content:center"><img src="${e.logo}" style="width:16px;height:16px;object-fit:contain;border-radius:2px" alt=""></div>`:'';
      const posColor=i===0?'#c9a84c':i===1?'#9ca3af':i===2?'#cd7f32':'rgba(255,255,255,.28)';
      return `<div class="ov-row ${pc} ${even}">
        <span class="ov-rpos ${pc}">${pos}</span>
        <span class="ov-rnum" style="background:${col};color:${tc2}">${esc(e.num)}</span>
        <div class="ov-rcol" style="background:${col}"></div>
        <div class="ov-rname" style="display:flex;align-items:center;gap:4px;flex:1;padding:0 4px 0 3px;overflow:hidden">
          <span style="font-size:11px;font-weight:900;color:#fff;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;flex-shrink:0;font-family:'Barlow Condensed',sans-serif">${esc(abbrev)}</span>
          <span style="font-size:8px;font-weight:500;color:rgba(255,255,255,.38);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(e.sub||'')}</span>
        </div>
        ${entryLogo}
        <span style="width:18px;text-align:center;font-size:10px;font-weight:700;color:${posColor};flex-shrink:0;padding-right:4px;font-family:'Barlow Condensed',sans-serif">${pos}</span>
      </div>`;
    }).join('');
    html+=`<div class="ov-group">
      <div class="ov-gh"><span class="ov-gh-label" style="background:${cl.color||'#333'};color:${tc}">${esc(cl.label||'CLASS')}</span>${clLogo}</div>
      ${rows}
    </div>`;
  });
  document.getElementById('preview-board').innerHTML=html;
}

/* ---- RENDER EDITOR ---- */
function render(){
  document.getElementById('m-series').value=data.meta.series||'';
  document.getElementById('m-session').value=data.meta.session||'';
  document.getElementById('m-lap').value=data.meta.lap||'';

  const cl=document.getElementById('classes-list');cl.innerHTML='';
  (data.classes||[]).forEach((cls,ci)=>{
    const sec=document.createElement('div');sec.className='section';
    const tc=contrast(cls.color);
    const clLogoContent=cls.logo?`<img src="${cls.logo}" alt="">`:'🏷';
    sec.innerHTML=`
    <div class="section-head">
      <span class="section-label" style="background:${cls.color};color:${tc}">${esc(cls.label)}</span>
      <div class="class-logo-box" title="Logo de classe (bannière)" id="cllogo-${ci}">${clLogoContent}</div>
      <input class="section-name" value="${esc(cls.label)}" placeholder="Nom classe" data-ci="${ci}">
      <input type="color" class="section-color" value="${cls.color||'#888888'}" data-ci="${ci}">
      <button class="del-section" data-ci="${ci}">✕</button>
    </div>
    <div class="list" id="list-${ci}"></div>
    <div style="padding:5px 5px 7px;display:flex;gap:6px">
      <button class="btn" onclick="addEntry(${ci})">＋ Pilote</button>
    </div>`;
    sec.querySelector('.section-name').addEventListener('input',ev=>{data.classes[+ev.target.dataset.ci].label=ev.target.value;schedSave();});
    sec.querySelector('.section-color').addEventListener('input',ev=>{data.classes[+ev.target.dataset.ci].color=ev.target.value;render();schedSave();});
    sec.querySelector('.del-section').addEventListener('click',ev=>{delClass(+ev.target.dataset.ci);});
    sec.querySelector('.class-logo-box').onclick=()=>{pendingClassLogo=ci;document.getElementById('class-logo-input').click();};
    cl.appendChild(sec);

    const list=document.getElementById('list-'+ci);
    cls.entries.forEach((e,i)=>{
      const rc=i===0?'r1':i===1?'r2':i===2?'r3':'';
      const col=e.color||'#555';const tc2=contrast(col);
      const logoEl=e.logo?`<img src="${e.logo}" alt="">`:`<span class="logo-fb" style="color:${tc2};background:${col};width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center">${esc(e.num).slice(0,3)}</span>`;
      const div=document.createElement('div');div.className='entry';div.draggable=true;div.dataset.i=i;div.dataset.ci=ci;
      div.innerHTML=`
        <span class="handle">⠿</span>
        <div class="pos ${rc}">${i+1}</div>
        <div class="logo-box" title="Logo équipe (cliquer)">${logoEl}</div>
        <input class="ei ei-num"  value="${esc(e.num)}"    placeholder="#"    data-f="num"    data-i="${i}" data-ci="${ci}">
        <input class="ei ei-abbrev" value="${esc(e.abbrev||'')}" placeholder="ABR" data-f="abbrev" data-i="${i}" data-ci="${ci}" title="Abréviation (ex: VER)">
        <input class="ei ei-name" value="${esc(e.name)}"   placeholder="Nom"  data-f="name"   data-i="${i}" data-ci="${ci}">
        <input class="ei ei-sub"  value="${esc(e.sub)}"    placeholder="Éq"   data-f="sub"    data-i="${i}" data-ci="${ci}">
        <input type="color" class="cpick" value="${col}" data-i="${i}" data-ci="${ci}">
        <button class="del" data-i="${i}" data-ci="${ci}">✕</button>`;
      div.querySelector('.logo-box').onclick=()=>{pendingLogo=i;pendingLogoClass=ci;document.getElementById('logo-input').click();};
      div.querySelectorAll('input[data-f]').forEach(inp=>inp.addEventListener('input',ev=>{data.classes[+ev.target.dataset.ci].entries[+ev.target.dataset.i][ev.target.dataset.f]=ev.target.value;schedSave();}));
      div.querySelector('.cpick').addEventListener('input',ev=>{data.classes[+ev.target.dataset.ci].entries[+ev.target.dataset.i].color=ev.target.value;render();schedSave();});
      div.querySelector('.del').onclick=ev=>delEntry(+ev.target.dataset.ci,+ev.target.dataset.i);
      div.addEventListener('dragstart',ev=>{dragSrc=div;div.classList.add('dragging');ev.dataTransfer.effectAllowed='move';});
      div.addEventListener('dragover',ev=>{ev.preventDefault();list.querySelectorAll('.entry').forEach(r=>r.classList.remove('over'));div.classList.add('over');});
      div.addEventListener('drop',ev=>{ev.stopPropagation();if(dragSrc&&dragSrc!==div&&dragSrc.dataset.ci===String(ci)){const fi=+dragSrc.dataset.i,ti=+div.dataset.i;const m=data.classes[ci].entries.splice(fi,1)[0];data.classes[ci].entries.splice(ti,0,m);render();schedSave();}});
      div.addEventListener('dragend',()=>list.querySelectorAll('.entry').forEach(r=>r.classList.remove('dragging','over')));
      list.appendChild(div);
    });
  });

  // Sync meta inputs live preview
  ['m-series','m-session','m-lap'].forEach(id=>{
    document.getElementById(id).addEventListener('input',()=>renderPreview());
  });

  renderPreview();
}

document.getElementById('logo-input').addEventListener('change',function(){
  if(!this.files[0]||pendingLogo===null||pendingLogoClass===null)return;
  const fr=new FileReader();fr.onload=ev=>{data.classes[pendingLogoClass].entries[pendingLogo].logo=ev.target.result;render();schedSave();};
  fr.readAsDataURL(this.files[0]);this.value='';pendingLogo=null;pendingLogoClass=null;
});

document.getElementById('class-logo-input').addEventListener('change',function(){
  if(!this.files[0]||pendingClassLogo===null)return;
  const fr=new FileReader();fr.onload=ev=>{data.classes[pendingClassLogo].logo=ev.target.result;render();schedSave();};
  fr.readAsDataURL(this.files[0]);this.value='';pendingClassLogo=null;
});

window.saveNow=saveToBin;window.forceLoad=loadFromBin;
</script>
</body>
</html>

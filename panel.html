<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Panel Admin — Classement Live</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0f1117;color:#e8eaf0;min-height:100vh}

/* ── ÉCRAN MOT DE PASSE ── */
#lock-screen{position:fixed;inset:0;background:#0f1117;display:flex;align-items:center;justify-content:center;z-index:9999}
.lock-box{background:#161922;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:40px 36px;width:340px;text-align:center}
.lock-logo{font-size:36px;margin-bottom:16px}
.lock-title{font-size:18px;font-weight:700;margin-bottom:6px}
.lock-sub{font-size:13px;color:#6b7280;margin-bottom:24px}
.lock-input{width:100%;background:#0f1117;border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 16px;font-size:16px;color:#e8eaf0;font-family:'Inter',sans-serif;outline:none;text-align:center;letter-spacing:3px;margin-bottom:12px}
.lock-input:focus{border-color:#3b82f6}
.lock-input.err{border-color:#ef4444;animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.lock-btn{width:100%;padding:12px;border-radius:10px;border:none;background:#e10600;color:#fff;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer}
.lock-btn:hover{background:#c00400}
.lock-err{font-size:12px;color:#ef4444;margin-top:8px;height:16px}

/* ── APP ── */
#app{display:none}
.topbar{background:#161922;border-bottom:1px solid rgba(255,255,255,.07);padding:13px 24px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.topbar h1{font-size:14px;font-weight:600;flex:1}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:background .3s}
.dot.ok{background:#22c55e;animation:p 2s infinite}
.dot.err{background:#ef4444}
.dot.loading{background:#f59e0b}
@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
.sync-lbl{font-size:11px;color:#6b7280}
.wrap{max-width:820px;margin:0 auto;padding:24px 16px}
.card{background:#161922;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:18px;margin-bottom:16px}
.card-title{font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:#4b5563;margin-bottom:14px}
.meta-row{display:grid;grid-template-columns:1fr 2fr 1fr;gap:10px}
@media(max-width:580px){.meta-row{grid-template-columns:1fr}}
.field label{display:block;font-size:11px;color:#6b7280;margin-bottom:5px}
input.fi{width:100%;background:#0f1117;border:1px solid rgba(255,255,255,.09);border-radius:8px;padding:9px 11px;font-size:13px;color:#e8eaf0;font-family:'Inter',sans-serif;outline:none;transition:border .15s}
input.fi:focus{border-color:#3b82f6}
.list{display:flex;flex-direction:column;gap:5px}
.entry{display:flex;align-items:center;gap:7px;background:#0f1117;border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:9px 11px;cursor:grab;user-select:none}
.entry:active{cursor:grabbing}
.entry.dragging{opacity:.3;border-style:dashed}
.entry.over{border-color:#3b82f6}
.handle{font-size:16px;color:#2d3748;flex-shrink:0}
.pos{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;background:#1f2937;color:#6b7280}
.pos.r1{background:#c9a84c1a;color:#c9a84c}.pos.r2{background:#6b72801a;color:#9ca3af}.pos.r3{background:#a0522d1a;color:#cd7f32}
.logo-box{width:36px;height:36px;border-radius:7px;border:1px solid rgba(255,255,255,.09);background:#1a1d26;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;cursor:pointer}
.logo-box:hover{border-color:#3b82f6}
.logo-box img{width:100%;height:100%;object-fit:contain}
.logo-fb{font-size:9px;font-weight:800}
.ei{background:#1a1d26;border:1px solid rgba(255,255,255,.08);border-radius:7px;padding:7px 9px;font-size:13px;color:#e8eaf0;font-family:'Inter',sans-serif;outline:none}
.ei:focus{border-color:#3b82f6}
.ei-num{width:46px;text-align:center;font-weight:700}
.ei-name{flex:1;min-width:0}
.ei-sub{width:110px}
.ei-pts{width:62px;text-align:right;font-weight:700;font-family:'Inter',monospace}
.cpick{width:30px;height:30px;padding:1px;border-radius:6px;border:1px solid rgba(255,255,255,.1);cursor:pointer;background:transparent;flex-shrink:0}
.del{width:26px;height:26px;border-radius:6px;border:none;background:transparent;cursor:pointer;color:#374151;font-size:14px;flex-shrink:0}
.del:hover{background:#2d1717;color:#ef4444}
.actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:14px}
.btn{padding:9px 16px;border-radius:9px;border:1px solid rgba(255,255,255,.1);background:#1a1d26;cursor:pointer;font-size:13px;font-weight:500;color:#e8eaf0;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:5px;transition:background .15s}
.btn:hover{background:#21263a}
.btn.go{background:#e10600;border-color:#a00400;color:#fff}
.btn.go:hover{background:#c00400}
.stt{font-size:11px;color:#374151;margin-left:auto}
</style>
</head>
<body>

<!-- ÉCRAN MOT DE PASSE -->
<div id="lock-screen">
  <div class="lock-box">
    <div class="lock-logo">🏁</div>
    <div class="lock-title">Panel Admin</div>
    <div class="lock-sub">Classement Live — Accès restreint</div>
    <input class="lock-input" id="pwd-input" type="password" placeholder="••••••" maxlength="20">
    <button class="lock-btn" onclick="checkPwd()">Accéder</button>
    <div class="lock-err" id="lock-err"></div>
  </div>
</div>

<!-- APP (cachée jusqu'au bon mdp) -->
<div id="app">
  <div class="topbar">
    <div class="dot loading" id="dot"></div>
    <h1>Panel Admin — Classement Live</h1>
    <span class="sync-lbl" id="sync-lbl">Chargement…</span>
  </div>
  <div class="wrap">
    <div class="card">
      <div class="card-title">Session</div>
      <div class="meta-row">
        <div class="field"><label>Série</label><input class="fi" id="m-series" placeholder="F1, WEC, GT3…"></div>
        <div class="field"><label>Session</label><input class="fi" id="m-session" placeholder="Race — Round 4"></div>
        <div class="field"><label>Info tour</label><input class="fi" id="m-lap" placeholder="Tour 58 / 70"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Classement</div>
      <div class="list" id="list"></div>
      <div class="actions">
        <button class="btn" onclick="addEntry()">＋ Ajouter</button>
        <button class="btn go" onclick="saveNow()">💾 Sauvegarder &amp; diffuser</button>
        <button class="btn" onclick="forceLoad()">↺ Sync</button>
        <span class="stt" id="stt">—</span>
      </div>
    </div>
  </div>
</div>

<input type="file" id="logo-input" accept="image/*" style="display:none">

<script>
const PASSWORD = "SWT";

function checkPwd(){
  const val = document.getElementById('pwd-input').value;
  if(val === PASSWORD){
    document.getElementById('lock-screen').style.display='none';
    document.getElementById('app').style.display='block';
    loadFromBin();
  } else {
    const inp = document.getElementById('pwd-input');
    inp.classList.add('err');
    document.getElementById('lock-err').textContent='Mot de passe incorrect';
    setTimeout(()=>{ inp.classList.remove('err'); inp.value=''; document.getElementById('lock-err').textContent=''; },1000);
  }
}
document.addEventListener('keydown', e=>{ if(e.key==='Enter') checkPwd(); });

const CONFIG={
  BIN_ID:"6a2095f2f5f4af5e29b4a8be",
  API_KEY:"$2a$10$MqXY3lAcczt1NJqs8jfK3.ESP.l5XPHjGmv0DfMhWPPDHcZRU0a3i",
  REFRESH_MS:2000
};
const DEFAULT_DATA={
  meta:{series:"F1",session:"Championnat — Saison 2025",lap:"Tour 1 / 70"},
  entries:[
    {num:"1",name:"Max Verstappen",sub:"Red Bull Racing",pts:"161",color:"#3671C6",logo:""},
    {num:"44",name:"Lewis Hamilton",sub:"Ferrari",pts:"129",color:"#E8002D",logo:""},
    {num:"63",name:"George Russell",sub:"Mercedes",pts:"111",color:"#27F4D2",logo:""},
    {num:"4",name:"Lando Norris",sub:"McLaren",pts:"105",color:"#FF8000",logo:""},
    {num:"16",name:"Charles Leclerc",sub:"Ferrari",pts:"98",color:"#E8002D",logo:""},
    {num:"55",name:"Carlos Sainz",sub:"Williams",pts:"82",color:"#64C4FF",logo:""}
  ]
};

let data={meta:{},entries:[]},dragSrc=null,autoTimer=null,pendingLogo=null,saving=false;
const API=`https://api.jsonbin.io/v3/b/${CONFIG.BIN_ID}`;
const HDR={'Content-Type':'application/json','X-Master-Key':CONFIG.API_KEY};

async function loadFromBin(){
  try{
    const r=await fetch(API+'/latest',{headers:{'X-Master-Key':CONFIG.API_KEY}});
    if(!r.ok)throw new Error(r.status);
    const j=await r.json();
    data=j.record||JSON.parse(JSON.stringify(DEFAULT_DATA));
    render();setSync('ok','Synchronisé · '+ts());
  }catch(e){setSync('err','Erreur chargement');data=JSON.parse(JSON.stringify(DEFAULT_DATA));render();}
}

async function saveToBin(){
  if(saving)return;saving=true;setSync('loading','Envoi…');syncMeta();
  try{
    const r=await fetch(API,{method:'PUT',headers:HDR,body:JSON.stringify(data)});
    if(!r.ok)throw new Error(r.status);
    setSync('ok','Diffusé ✓ · '+ts());setStt('Diffusé ✓ · '+ts());
  }catch(e){setSync('err','Erreur : '+e.message);setStt('Erreur !');}
  saving=false;
}

function ts(){return new Date().toLocaleTimeString('fr-FR');}
function setSync(s,msg){document.getElementById('dot').className='dot '+s;document.getElementById('sync-lbl').textContent=msg;}
function setStt(m){document.getElementById('stt').textContent=m;}
function schedSave(){clearTimeout(autoTimer);autoTimer=setTimeout(saveToBin,1800);}
function syncMeta(){data.meta={series:document.getElementById('m-series').value,session:document.getElementById('m-session').value,lap:document.getElementById('m-lap').value};}
function addEntry(){data.entries.push({num:String(data.entries.length+1),name:'Nouveau',sub:'Équipe',pts:'0',color:'#888888',logo:''});render();schedSave();}
function delEntry(i){data.entries.splice(i,1);render();schedSave();}

function render(){
  document.getElementById('m-series').value=data.meta.series||'';
  document.getElementById('m-session').value=data.meta.session||'';
  document.getElementById('m-lap').value=data.meta.lap||'';
  const list=document.getElementById('list');list.innerHTML='';
  data.entries.forEach((e,i)=>{
    const rc=i===0?'r1':i===1?'r2':i===2?'r3':'';
    const tc=contrast(e.color);
    const logoEl=e.logo?`<img src="${e.logo}" alt="">`:`<span class="logo-fb" style="color:${tc};background:${e.color};width:28px;height:28px;border-radius:5px;display:flex;align-items:center;justify-content:center">${esc(e.num).slice(0,3)}</span>`;
    const div=document.createElement('div');
    div.className='entry';div.draggable=true;div.dataset.i=i;
    div.innerHTML=`
      <span class="handle">⠿</span>
      <div class="pos ${rc}">${i+1}</div>
      <div class="logo-box" title="Changer logo">${logoEl}</div>
      <input class="ei ei-num"  value="${esc(e.num)}"  placeholder="#"      data-f="num"  data-i="${i}">
      <input class="ei ei-name" value="${esc(e.name)}" placeholder="Nom"    data-f="name" data-i="${i}">
      <input class="ei ei-sub"  value="${esc(e.sub)}"  placeholder="Équipe" data-f="sub"  data-i="${i}">
      <input class="ei ei-pts"  value="${esc(e.pts)}"  placeholder="Pts"    data-f="pts"  data-i="${i}">
      <input type="color" class="cpick" value="${e.color||'#888888'}" data-i="${i}">
      <button class="del" data-i="${i}">✕</button>`;
    div.querySelector('.logo-box').onclick=()=>{pendingLogo=i;document.getElementById('logo-input').click();};
    div.querySelectorAll('input[data-f]').forEach(inp=>inp.addEventListener('input',ev=>{data.entries[+ev.target.dataset.i][ev.target.dataset.f]=ev.target.value;schedSave();}));
    div.querySelector('.cpick').addEventListener('input',ev=>{data.entries[+ev.target.dataset.i].color=ev.target.value;render();schedSave();});
    div.querySelector('.del').onclick=()=>delEntry(i);
    div.addEventListener('dragstart',e=>{dragSrc=div;div.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    div.addEventListener('dragover',e=>{e.preventDefault();list.querySelectorAll('.entry').forEach(r=>r.classList.remove('over'));div.classList.add('over');});
    div.addEventListener('drop',e=>{e.stopPropagation();if(dragSrc&&dragSrc!==div){const fi=+dragSrc.dataset.i,ti=+div.dataset.i;const m=data.entries.splice(fi,1)[0];data.entries.splice(ti,0,m);render();schedSave();}});
    div.addEventListener('dragend',()=>list.querySelectorAll('.entry').forEach(r=>r.classList.remove('dragging','over')));
    list.appendChild(div);
  });
}

document.getElementById('logo-input').addEventListener('change',function(){
  if(!this.files[0]||pendingLogo===null)return;
  const fr=new FileReader();
  fr.onload=ev=>{data.entries[pendingLogo].logo=ev.target.result;render();schedSave();};
  fr.readAsDataURL(this.files[0]);this.value='';pendingLogo=null;
});

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function contrast(hex){const h=hex||'#888',r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return(r*299+g*587+b*114)/1000>128?'#111':'#fff';}

window.saveNow=saveToBin;
window.forceLoad=loadFromBin;
</script>
</body>
</html>

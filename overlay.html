<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Overlay WEC</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:transparent;font-family:'Inter',sans-serif;width:260px;overflow:hidden}

.board{width:260px}

/* HEADER SESSION */
.sh{display:flex;align-items:center;background:rgba(8,10,18,.72);border-bottom:2px solid rgba(225,6,0,.7);padding:3px 6px 3px 5px;gap:5px;margin-bottom:2px;backdrop-filter:blur(6px)}
.sh-badge{background:rgba(225,6,0,.75);color:rgba(255,255,255,.92);font-size:8px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:2px 5px;border-radius:2px;flex-shrink:0}
.sh-session{font-size:9px;font-weight:600;color:rgba(255,255,255,.85);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sh-lap{font-size:9px;font-weight:700;color:rgba(245,158,11,.8);font-family:'Inter',monospace;flex-shrink:0}
.sh-time{font-size:9px;color:rgba(255,255,255,.3);font-family:'Inter',monospace;flex-shrink:0;margin-left:3px}

/* GROUPE DE CLASSE */
.group{margin-bottom:2px}
.gh{display:flex;align-items:center;padding:3px 6px;gap:4px;backdrop-filter:blur(4px)}
.gh-label{font-size:8px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:1px 5px;border-radius:2px;flex-shrink:0;opacity:.8}
.gh-logo{width:16px;height:16px;object-fit:contain;border-radius:2px;margin-left:3px}

/* LIGNES */
.row{display:flex;align-items:center;height:20px;border-bottom:1px solid rgba(255,255,255,.03);position:relative;overflow:hidden;backdrop-filter:blur(4px)}
.row:last-child{border-bottom:none}

/* BG alterné — semi-transparent */
.row.even{background:rgba(8,10,18,.58)}
.row.odd{background:rgba(14,16,26,.62)}

/* Accent podium — adouci */
.row.p1{border-left:3px solid rgba(201,168,76,.65)}
.row.p2{border-left:3px solid rgba(140,140,140,.5)}
.row.p3{border-left:3px solid rgba(160,82,45,.55)}
.row.pn{border-left:3px solid transparent}

/* Position */
.rpos{width:18px;text-align:center;font-size:10px;font-weight:700;flex-shrink:0}
.rpos.p1{color:rgba(201,168,76,.85)}.rpos.p2{color:rgba(156,163,175,.7)}.rpos.p3{color:rgba(205,127,50,.75)}.rpos.pn{color:rgba(255,255,255,.22)}

/* Numéro voiture */
.rnum{font-size:9px;font-weight:900;width:22px;text-align:center;flex-shrink:0;border-radius:2px;margin:0 2px;line-height:14px;height:14px;opacity:.85}

/* Logo / couleur */
.rcol{width:2px;flex-shrink:0;align-self:stretch;opacity:.6}

/* Nom pilote — abréviation + team */
.rname{display:flex;align-items:center;gap:4px;flex:1;padding:0 4px 0 3px;overflow:hidden}
.abbrev{font-size:11px;font-weight:900;color:rgba(255,255,255,.9);letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;flex-shrink:0}
.team-sub{font-size:8px;font-weight:500;color:rgba(255,255,255,.3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Position à droite */
.rpos-right{width:18px;text-align:center;font-size:10px;font-weight:700;flex-shrink:0;padding-right:4px}
.rpos-right.p1{color:rgba(201,168,76,.8)}.rpos-right.p2{color:rgba(156,163,175,.65)}.rpos-right.p3{color:rgba(205,127,50,.7)}.rpos-right.pn{color:rgba(255,255,255,.2)}

/* Logo équipe */
.rlogo{width:16px;height:16px;flex-shrink:0;margin-right:3px;display:flex;align-items:center;justify-content:center}
.rlogo img{width:16px;height:16px;object-fit:contain;border-radius:2px}

/* LOADING */
.loading{padding:14px;text-align:center;font-size:11px;color:rgba(255,255,255,.2);background:rgba(8,10,18,.6)}
</style>
</head>
<body>
<div class="board" id="board"><div class="loading">Connexion…</div></div>
<script>
const CONFIG={BIN_ID:"6a2095f2f5f4af5e29b4a8be",API_KEY:"$2a$10$MqXY3lAcczt1NJqs8jfK3.ESP.l5XPHjGmv0DfMhWPPDHcZRU0a3i",REFRESH_MS:2000};
const DEFAULT_DATA={
  meta:{series:"WEC",session:"Race — Round 4",lap:"Lap 1 / 70",elapsed:"0:35"},
  classes:[
    {label:"HYPERCAR",color:"#e10600",textColor:"#fff",entries:[
      {num:"2",name:"Hartley",sub:"Porsche",pts:"0",color:"#e10600",logo:""},
      {num:"50",name:"Fuoco",sub:"Ferrari",pts:"0.249",color:"#e8002d",logo:""},
      {num:"7",name:"Conway",sub:"Toyota",pts:"0.634",color:"#eb0a1e",logo:""}
    ]}
  ],
  entries:[
    {num:"1",name:"Max Verstappen",sub:"Red Bull",pts:"161",color:"#3671C6",logo:""},
    {num:"44",name:"Lewis Hamilton",sub:"Ferrari",pts:"129",color:"#E8002D",logo:""},
    {num:"63",name:"George Russell",sub:"Mercedes",pts:"111",color:"#27F4D2",logo:""},
    {num:"4",name:"Lando Norris",sub:"McLaren",pts:"105",color:"#FF8000",logo:""},
    {num:"16",name:"Charles Leclerc",sub:"Ferrari",pts:"98",color:"#E8002D",logo:""},
    {num:"55",name:"Carlos Sainz",sub:"Williams",pts:"82",color:"#64C4FF",logo:""}
  ]
};

const API=`https://api.jsonbin.io/v3/b/${CONFIG.BIN_ID}/latest`;
const HDR={'X-Master-Key':CONFIG.API_KEY};

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function contrast(hex){const h=hex||'#888',r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return(r*299+g*587+b*114)/1000>128?'#111':'#fff';}

function getAbbrev(fullname){
  // Use abbrev field if present, else build from name (e.g. "Max Verstappen" → "VER")
  const parts=(fullname||'').trim().split(' ');
  if(parts.length===1)return parts[0].slice(0,3).toUpperCase();
  // Last name, up to 3 chars
  return parts[parts.length-1].slice(0,3).toUpperCase();
}

function renderRows(entries,leaderPts){
  return entries.map((e,i)=>{
    const pos=i+1;
    const pc=i===0?'p1':i===1?'p2':i===2?'p3':'pn';
    const even=i%2===0?'even':'odd';
    const col=e.color||'#555';
    const tc=contrast(col);
    const abbrev=e.abbrev||getAbbrev(e.name);
    const logo=e.logo?`<div class="rlogo"><img src="${esc(e.logo)}" alt=""></div>`:'';
    return `<div class="row ${pc} ${even}">
      <span class="rpos ${pc}">${pos}</span>
      <span class="rnum" style="background:${col};color:${tc}">${esc(e.num)}</span>
      <div class="rcol" style="background:${col}"></div>
      <div class="rname">
        <span class="abbrev">${esc(abbrev)}</span>
        <span class="team-sub">${esc(e.sub||'')}</span>
      </div>
      ${logo}
      <span class="rpos-right ${pc}">${pos}</span>
    </div>`;
  }).join('');
}

function render(d){
  const meta=d.meta||{};
  const elapsed=meta.elapsed?`<span class="sh-time">${esc(meta.elapsed)}</span>`:'';

  let html=`<div class="sh">
    <span class="sh-badge">${esc(meta.series||'LIVE')}</span>
    <span class="sh-session">${esc(meta.session||'Session')}</span>
    <span class="sh-lap">${esc(meta.lap||'')}</span>
    ${elapsed}
  </div>`;

  if(d.classes&&d.classes.length>0){
    d.classes.forEach(cl=>{
      const tc=cl.textColor||'#fff';
      const clLogo=cl.logo?`<img src="${esc(cl.logo)}" class="gh-logo" alt="">`:'';
      html+=`<div class="group">
        <div class="gh" style="background:rgba(8,10,18,.68)">
          <span class="gh-label" style="background:${cl.color||'#333'};color:${tc}">${esc(cl.label||'CLASS')}</span>
          ${clLogo}
        </div>
        ${renderRows(cl.entries||[], (cl.entries&&cl.entries[0])?cl.entries[0].pts:'0')}
      </div>`;
    });
  } else {
    const entries=d.entries||[];
    const top=entries[0]?entries[0].pts:'0';
    html+=`<div class="group">${renderRows(entries,top)}</div>`;
  }

  document.getElementById('board').innerHTML=html;
}

async function poll(){
  try{const r=await fetch(API,{headers:HDR});if(r.ok){const j=await r.json();render(j.record||DEFAULT_DATA);}}catch(e){}
  setTimeout(poll,CONFIG.REFRESH_MS||2000);
}
render(DEFAULT_DATA);poll();
</script>
</body>
</html>

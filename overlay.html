<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
html,body{margin:0;padding:0;background:transparent;font-family:'Inter',sans-serif;width:440px;overflow:hidden}
.board{width:440px;border-radius:10px;overflow:hidden}
.bh{background:rgba(8,10,16,.96);border-bottom:1px solid rgba(255,255,255,.08);padding:9px 14px;display:flex;align-items:center;gap:10px}
.bs{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.35);border:1px solid rgba(255,255,255,.14);padding:3px 8px;border-radius:4px;flex-shrink:0}
.bn{font-size:12px;font-weight:600;color:#fff;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bl{font-size:10px;color:rgba(255,255,255,.35);font-family:'Inter',monospace;flex-shrink:0}
.row{display:flex;align-items:stretch;background:rgba(10,12,20,.93);border-bottom:1px solid rgba(255,255,255,.05);transition:background .4s}
.row:last-child{border:none}
.row.p1{border-left:3px solid #c9a84c}.row.p2{border-left:3px solid #8c8c8c}.row.p3{border-left:3px solid #a0522d}.row.pn{border-left:3px solid transparent}
.rp{width:36px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.rp.p1{color:#c9a84c}.rp.p2{color:#8c8c8c}.rp.p3{color:#a0522d}.rp.pn{color:rgba(255,255,255,.25)}
.cb{width:4px;flex-shrink:0}
.lc{width:42px;display:flex;align-items:center;justify-content:center;padding:7px 5px;flex-shrink:0}
.lc img{width:28px;height:28px;object-fit:contain;border-radius:4px}
.lf{width:28px;height:28px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800}
.ic{flex:1;display:flex;flex-direction:column;justify-content:center;padding:8px 4px 8px 2px;min-width:0}
.dn{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
.tn{font-size:10px;color:rgba(255,255,255,.38);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nb{display:inline-flex;align-items:center;font-size:9px;font-weight:800;padding:2px 5px;border-radius:3px;margin-left:5px;vertical-align:middle;opacity:.88}
.pc{padding:8px 14px 8px 6px;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;flex-shrink:0;min-width:70px}
.pv{font-size:15px;font-weight:700;color:#fff;font-family:'Inter',monospace;line-height:1}
.pl{font-size:9px;color:rgba(255,255,255,.28);text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
.gv{font-size:10px;color:rgba(255,255,255,.32);margin-top:2px;font-family:'Inter',monospace}
.gv.leader{color:#c9a84c}
.loading{padding:18px;text-align:center;font-size:11px;color:rgba(255,255,255,.25);background:rgba(10,12,20,.93)}
</style>
</head>
<body>
<div class="board" id="board"><div class="loading">Connexion…</div></div>
<script>
const CONFIG={
  BIN_ID:"6a2095f2f5f4af5e29b4a8be",
  API_KEY:"$2a$10$MqXY3lAcczt1NJqs8jfK3.ESP.l5XPHjGmv0DfMhWPPDHcZRU0a3i",
  REFRESH_MS:2000
};
const DEFAULT_DATA={
  meta:{series:"F1",session:"Championnat — Saison 2025",lap:"Tour 1 / 70"},
  entries:[
    {num:"1",name:"Max Verstappen",sub:"Red Bull Racing",pts:"161",color:"#3671C6",logo:""},
    {num:"44",name:"Lewis Hamilton",sub:"Ferrari",pts:"129",color:"#E8002D",logo:""},
    {num:"63",name:"George Russell",sub:"Mercedes",pts:"111",color:"#27F4D2",logo:""},
    {num:"4",name:"Lando Norris",sub:"McLaren",pts:"105",color:"#FF8000",logo:""},
    {num:"16",name:"Charles Leclerc",sub:"Ferrari",pts:"98",color:"#E8002D",logo:""},
    {num:"55",name:"Carlos Sainz",sub:"Williams",pts:"82",color:"#64C4FF",logo:""}
  ]
};

const API=`https://api.jsonbin.io/v3/b/${CONFIG.BIN_ID}/latest`;
const HDR={'X-Master-Key':CONFIG.API_KEY};

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function contrast(hex){const h=hex||'#888',r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return(r*299+g*587+b*114)/1000>128?'#111':'#fff';}

function render(d){
  const entries=d.entries||[];const meta=d.meta||{};const top1=entries[0]?parseFloat(entries[0].pts)||0:0;
  let html=`<div class="bh"><span class="bs">${esc(meta.series||'LIVE')}</span><span class="bn">${esc(meta.session||'Session')}</span><span class="bl">${esc(meta.lap||'')}</span></div>`;
  entries.forEach((e,i)=>{
    const pc=i===0?'p1':i===1?'p2':i===2?'p3':'pn';
    const pts=parseFloat(e.pts)||0;
    const gap=i===0?`<div class="gv leader">Leader</div>`:`<div class="gv">+${(top1-pts).toFixed(0)} pts</div>`;
    const col=e.color||'#555';const tc=contrast(col);
    const lo=e.logo?`<img src="${esc(e.logo)}" alt="">`:`<div class="lf" style="background:${col};color:${tc}">${esc((e.num||'').slice(0,3))}</div>`;
    html+=`<div class="row ${pc}">
      <div class="rp ${pc}">${i+1}</div>
      <div class="cb" style="background:${col}"></div>
      <div class="lc">${lo}</div>
      <div class="ic"><div class="dn">${esc(e.name)}<span class="nb" style="background:${col};color:${tc}">${esc(e.num)}</span></div><div class="tn">${esc(e.sub)}</div></div>
      <div class="pc"><div class="pv">${esc(e.pts)}</div><div class="pl">pts</div>${gap}</div>
    </div>`;
  });
  document.getElementById('board').innerHTML=html;
}

async function poll(){
  try{const r=await fetch(API,{headers:HDR});if(r.ok){const j=await r.json();render(j.record||DEFAULT_DATA);}}catch(e){}
  setTimeout(poll,CONFIG.REFRESH_MS||2000);
}

render(DEFAULT_DATA);
poll();
</script>
</body>
</html>
